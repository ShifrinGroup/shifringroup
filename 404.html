    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest-deep:    #1B3A2D;
      --forest-deeper:  #142E23;
      --forest-accent:  #2D6B4A;
      --parchment:      #F5F3EE;
      --parchment-warm: #EBE8E1;
      --ink:            #1A1A18;
      --ink-soft:       #3D3D38;
      --ink-muted:      #5C5C55;
      --ink-tertiary:   #7A7A72;
      --cream:          #F0EDE5;
      --cream-muted:    #BDC9C2;
      --gold:           #A8823A;
      --rule:           #D6D2CB;
      --rule-light:     #E6E3DC;
      --ff-serif: 'EB Garamond', Georgia, serif;
      --ff-sans:  'Tenor Sans', sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--forest-deep);
      color: var(--cream);
      font-family: var(--ff-sans);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 64px;
      height: 68px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .nav-logo span {
      font-family: var(--ff-serif);
      font-size: 17px;
      letter-spacing: 0.06em;
      color: var(--cream);
    }

    .nav-links {
      display: flex;
      gap: 48px;
      list-style: none;
    }
    .nav-links a {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--cream); }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
    }

    .error-num {
      font-family: var(--ff-serif);
      font-size: clamp(100px, 18vw, 160px);
      font-weight: 400;
      line-height: 1;
      color: rgba(240,237,229,0.06);
      letter-spacing: -0.02em;
      margin-bottom: -16px;
      user-select: none;
    }

    .gold-rule {
      width: 32px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 28px;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    h1 {
      font-family: var(--ff-serif);
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 16px;
      line-height: 1.25;
    }
    h1 em { font-style: italic; color: var(--cream-muted); }

    p {
      font-size: 14px;
      line-height: 1.85;
      color: var(--cream-muted);
      max-width: 420px;
      margin-bottom: 48px;
      letter-spacing: 0.02em;
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--ff-sans);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      border: 1px solid rgba(240,237,229,0.28);
      padding: 13px 26px;
      transition: border-color 0.25s, background 0.25s, color 0.25s;
    }
    .btn-outline:hover {
      border-color: var(--gold);
      background: rgba(168,130,58,0.1);
      color: var(--gold);
    }

    /* FOOTER */
    footer {
      background: var(--forest-deeper);
      padding: 28px 64px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .footer-logo {
      font-family: var(--ff-serif);
      font-size: 15px;
      letter-spacing: 0.06em;
      color: var(--cream-muted);
    }
    .footer-copy {
      font-size: 10px;
      letter-spacing: 0.07em;
      color: rgba(189,201,194,0.4);
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
    }
    @media (max-width: 640px) {
      nav { padding: 0 24px; }
      footer { padding: 24px; flex-direction: column; gap: 10px; }
    }
